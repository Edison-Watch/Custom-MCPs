# Railway config-as-code for the documentation site (Next.js + Fumadocs).
# Deploy this folder as its own Railway service with Root Directory = docs.
# Docs: https://docs.railway.com/reference/config-as-code
#
# Sibling services in the same Railway project (eito-projects):
#   - gmailmcp-backend       -> /railway.json        (Python API, mcp.gmailmcp.com)
#   - gmailmcp-landing-page  -> /landing-page/...     (Astro static, gmailmcp.com)
#   - gmailmcp-docs          -> this file             (Next.js docs, docs.gmailmcp.com)
#
# Builder is RAILPACK: Railway auto-detects the bun/Next.js project from bun.lock.
# `bun install` runs the `postinstall` hook (fumadocs-mdx) to generate .source.

[build]
builder = "RAILPACK"
buildCommand = "bun run build"

[deploy]
# `next start` binds 0.0.0.0 and reads $PORT automatically.
startCommand = "bun run start"
# Home ("/") 308-redirects to the default locale; hit /en directly for a 200.
healthcheckPath = "/en"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
