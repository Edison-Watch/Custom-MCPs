[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "lint-links", name = "Lint markdown links", entry = "uv run python scripts/lint_links.py", language = "system", pass_filenames = false, always_run = true },
    { id = "make-fmt", name = "Run formatter (make fmt)", entry = "make fmt", language = "system", pass_filenames = false, always_run = true },
    { id = "ruff-check", name = "Run ruff linter", entry = "uv run ruff check", language = "system", pass_filenames = false, always_run = true },
    { id = "ruff-complexity", name = "Check cyclomatic complexity", entry = "uv run ruff check --select C901", language = "system", pass_filenames = false, always_run = true },
    { id = "ruff-tech-debt", name = "Check TODO/FIXME markers", entry = "uv run ruff check --select FIX", language = "system", pass_filenames = false, always_run = true },
    { id = "pylint-duplicate-code", name = "Detect duplicate code", entry = "uv run python -m pylint --disable=all --enable=R0801 src common utils", language = "system", pass_filenames = false, always_run = true },
    { id = "ai-writing-check", name = "AI writing check", entry = "uv run python scripts/check_ai_writing.py", language = "system", pass_filenames = false, always_run = true },
    { id = "blind-except-check", name = "Check `# noqa: BLE001` justifications", entry = "uv run python scripts/check_blind_except_justification.py", language = "system", pass_filenames = false, always_run = true },
]

# Claude <-> Codex skill & subagent sync
[[repos]]
repo = "local"
hooks = [
    { id = "sync-agent-config", name = "sync Claude <-> Codex skills & subagents; fail if drift was fixed", entry = "uv run scripts/sync_agent_config.py --check", language = "system", pass_filenames = false, always_run = true },
    { id = "sync-skills", name = "sync skills/ -> landing-page/.well-known; fail if drift", entry = "uv run scripts/sync_skills.py --check", language = "system", pass_filenames = false, always_run = true },
]

# Keep the landing-page tool-surface snapshot in step with the @service registry.
# Triggers only on the files that can change the surface: the services/ package
# (where every @service lives, auto-discovered from there), the exclusion set in
# mcp_server/server.py, and the generated snapshot itself (so a hand-edit is
# caught too). Regenerates tool-surface.generated.json and fails the commit if it
# drifted, so the static server card can never go stale.
[[repos]]
repo = "local"
hooks = [
    { id = "export-tool-surface", name = "export MCP tool surface; fail if drift was fixed", entry = "uv run python scripts/export_tool_surface.py --check", language = "system", pass_filenames = false, files = "^(services/.*\\.py|mcp_server/server\\.py|landing-page/src/config/tool-surface\\.generated\\.json)$" },
]

# ── Source-size guardrails (mirror GitHub Actions) ────────────────
[[repos]]
repo = "local"

[[repos.hooks]]
id = "check-file-length"
name = "fail if any source file exceeds the max line count"
language = "system"
entry = "uv run python scripts/check_file_length.py"
files = "\\.(py|ts|tsx)$"
pass_filenames = false

[[repos.hooks]]
id = "check-folder-sizes"
name = "fail if any source folder exceeds the file-count error threshold"
language = "system"
entry = "scripts/check_folder_sizes.sh"
files = "\\.(py|ts|tsx)$"
